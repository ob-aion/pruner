version: 1

# Pruner's own self-scan allowlist. Every entry MUST carry a justification —
# reviewers audit suppressions by reading this file alongside the report.
ignores:
  - rule: PI-UNI-001
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — Tag-block payload is the test surface for PI-UNI-001."

  - rule: PI-UNI-003
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — bidi-override demonstrates Trojan-Source detection."

  - rule: PI-IDFILE-001
    path: examples/vulnerable-skill/scripts/install.sh
    justification: "Intentional vulnerable-skill fixture — identity-file write demonstrates PI-IDFILE-001."

  - rule: PI-PEP723-001
    path: examples/vulnerable-skill/scripts/setup.py
    justification: "Intentional vulnerable-skill fixture — unpinned PEP-723 deps demonstrates PI-PEP723-001."

  - rule: PI-MDIMG-001
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — markdown-image data-exfil demonstrates PI-MDIMG-001."

  - rule: PI-MDIMG-001
    path: examples/vulnerable-skill/EXPECTATIONS.md
    justification: "Cross-walk for vulnerable-skill — quotes the markdown-image syntax for documentation."

  - rule: FC001
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — non-kebab-case name is the test surface for FC001."

  - rule: FC003
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — top-level custom_field demonstrates FC003."

  - rule: FC004
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — metadata.version present demonstrates FC004."

  - rule: FC005
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — non-SPDX license demonstrates FC005."

  - rule: PI-UNI-005
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — clustered zero-width chars demonstrate PI-UNI-005."

  - rule: PI-EXFIL-001
    path: examples/vulnerable-skill/scripts/install.sh
    justification: "Intentional vulnerable-skill fixture — Discord webhook URL demonstrates PI-EXFIL-001."

  - rule: PI-EXFIL-002
    path: examples/vulnerable-skill/scripts/install.sh
    justification: "Intentional vulnerable-skill fixture — curl-pipe-bash demonstrates PI-EXFIL-002."

  - rule: PI-PERM-001
    path: examples/vulnerable-skill/SKILL.md
    justification: "Intentional vulnerable-skill fixture — allowed-tools mismatch with sibling scripts demonstrates PI-PERM-001."

  # finding-positive-skill — intentional fixture. The path-rooted entries below
  # suppress the findings in `pruner-self-scan` (target-path: `.`, paths land as
  # `examples/finding-positive-skill/SKILL.md`). The `pruner-finding-positive`
  # job scans `examples/finding-positive-skill` directly, so finding paths are
  # bare `SKILL.md` and the entries do not match — findings fire there, exit-code
  # propagation gets exercised.
  - rule: FC001
    path: examples/finding-positive-skill/SKILL.md
    justification: "Intentional finding-positive-skill fixture — non-kebab-case name trips FC001 to keep `pruner scan` exit 1 wired through `coroboros-pack-run`."

  - rule: FC003
    path: examples/finding-positive-skill/SKILL.md
    justification: "Intentional finding-positive-skill fixture — top-level `custom_field` trips FC003 for the same exit-code-propagation purpose."

  - rule: FC004
    path: examples/finding-positive-skill/SKILL.md
    justification: "Intentional finding-positive-skill fixture — `metadata.version` trips FC004 for the same exit-code-propagation purpose."

  - rule: FC005
    path: examples/finding-positive-skill/SKILL.md
    justification: "Intentional finding-positive-skill fixture — non-SPDX license string trips FC005 for the same exit-code-propagation purpose."
