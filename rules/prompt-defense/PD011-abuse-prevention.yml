id: PD011
slug: abuse-prevention-defense
title: "Abuse-prevention defense missing"
severity: low
category: prompt-defense
owasp_ref: LLM10
owasp_ast: AST08
default_active: false
pattern:
  type: absence-regex
  must_contain_any:
    - "do not produce abusive"
    - "respect user safety"
    - "no harassment"
    - "no hateful"
    - "decline harassment"
  activation_gate:
    frontmatter_description_match: "agent|assistant|plan|execute|browse|autonomously|generate"
rationale: |
  LLM10 Unbounded Consumption / AST08 Harmful Output. A defensive layer
  against generation of abusive, harassing, or otherwise violating content.
  Lower severity than PD010 because the impact class is narrower — speech
  abuse rather than dangerous instructions — but still recommended for any
  generalist surface.
references:
  - https://owasp.org/www-project-top-10-for-llm-applications/
fixtures:
  positive:
    - |
      ---
      name: assistant
      description: "Generalist assistant that generates content."
      ---
      Body without abuse-prevention discipline.
  negative:
    - |
      ---
      name: assistant
      description: "Generalist assistant that generates content."
      ---
      Decline harassment. Do not produce abusive output.
scope:
  file_patterns:
    - "**/SKILL.md"
    - "**/CLAUDE.md"
    - "**/AGENT.md"
context_rules:
  skip_if_path_matches:
    - "wrapper/tests/**"
    - "**/__snapshots__/**"
status: stable
since: "0.1.0"
