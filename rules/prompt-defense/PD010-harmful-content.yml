id: PD010
slug: harmful-content-defense
title: "Harmful-content defense missing"
severity: high
category: prompt-defense
owasp_ref: LLM09
owasp_ast: AST08
default_active: false
pattern:
  type: absence-regex
  must_contain_any:
    - "refuse harmful"
    - "do not generate harmful"
    - "decline requests for"
    - "harmful content"
    - "responsible ai"
    - "anthropic usage policy"
  activation_gate:
    frontmatter_description_match: "agent|assistant|plan|execute|browse|autonomously|generate"
rationale: |
  LLM09 Misinformation / AST08 Harmful Output Generation. A generalist agent
  prompt without explicit harmful-content refusal language defaults to the
  underlying model's training-time safety bar, which jailbreak prompts can
  reach. Explicit instructions tighten the refusal surface.
references:
  - https://owasp.org/www-project-top-10-for-llm-applications/
  - https://owasp.org/www-project-agentic-skills-top-10/
fixtures:
  positive:
    - |
      ---
      name: assistant
      description: "Generalist assistant that generates content."
      ---
      Body without harmful-content language.
  negative:
    - |
      ---
      name: assistant
      description: "Generalist assistant that generates content."
      ---
      Refuse harmful content requests. Decline requests for instructions on illegal acts.
scope:
  file_patterns:
    - "**/SKILL.md"
    - "**/CLAUDE.md"
    - "**/AGENT.md"
context_rules:
  skip_if_path_matches:
    - "wrapper/tests/**"
    - "**/__snapshots__/**"
status: stable
since: "0.1.0"
