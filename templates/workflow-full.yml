name: Pruner — Security Audit
on:
  pull_request:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  audit:
    uses: ob-aion/pruner/.github/workflows/scan.yml@0.2.12
    with:
      fail-on: medium
      skill-pattern: 'skills/*/SKILL.md'
      report-output: ./.pruner
      scan-prompt-defense-posture: false
      with-snyk: false
    secrets: inherit
