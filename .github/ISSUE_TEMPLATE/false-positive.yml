name: False positive
description: Report a rule firing on legitimate content
title: "[false-positive] <RULE_ID> — <short context>"
labels: [false-positive]
body:
  - type: markdown
    attributes:
      value: |
        Help us tighten the rule. Include a minimal reproducer; vague reports get closed.
  - type: input
    id: rule_id
    attributes:
      label: Rule ID
      placeholder: PI-UNI-001
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: SKILL.md or script content. Strip irrelevant context.
      render: text
    validations:
      required: true
  - type: textarea
    id: why_fp
    attributes:
      label: Why this is a false positive
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed `context_rules` refinement (optional)
      description: e.g. `skip_if_path_matches: ["docs/**"]`
      render: yaml
  - type: input
    id: pruner_version
    attributes:
      label: Pruner version
      placeholder: 0.1.0
    validations:
      required: true
