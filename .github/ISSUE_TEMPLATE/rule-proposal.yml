name: Rule proposal
description: Propose a new Coroboros pack rule
title: "[rule-proposal] <RULE_ID> — <short title>"
labels: [rule-proposal]
body:
  - type: markdown
    attributes:
      value: |
        Proposing a rule? Make sure it covers a documented gap in `cisco-ai-skill-scanner` (Cisco runs first; we add what they miss). Confirm against [`docs/coverage-matrix.md`](../../blob/main/docs/coverage-matrix.md).
  - type: input
    id: rule_id
    attributes:
      label: Proposed rule ID
      description: e.g. PI-FOO-001 or FC006
      placeholder: PI-FOO-001
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Cite OWASP LLM/AST refs, primary research, or a named incident.
    validations:
      required: true
  - type: input
    id: owasp_ref
    attributes:
      label: OWASP LLM ref
      placeholder: LLM01
    validations:
      required: true
  - type: input
    id: owasp_ast
    attributes:
      label: OWASP AST ref
      placeholder: AST01
    validations:
      required: true
  - type: textarea
    id: positive_fixture
    attributes:
      label: Positive fixture
      description: A file or snippet the rule should match.
      render: text
    validations:
      required: true
  - type: textarea
    id: negative_fixture
    attributes:
      label: Negative fixture
      description: A file or snippet the rule should NOT match.
      render: text
    validations:
      required: true
  - type: textarea
    id: fp_measurement
    attributes:
      label: FP measurement
      description: Run on `examples/benign-skill` and ≥3 public skill repos. Report counts.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Proposed severity
      options:
        - critical
        - high
        - medium
        - low
        - info
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - prompt-injection
        - prompt-defense
        - secrets
        - permissions
        - integrity
        - governance
        - supply-chain
    validations:
      required: true
