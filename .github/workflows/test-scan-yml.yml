name: test-scan-yml
on:
  pull_request:

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

# Exercises scan.yml end-to-end on every PR. self-scan.yml uses `./` directly and skips it.
jobs:
  benign-target:
    name: scan.yml against examples/benign-skill
    uses: ./.github/workflows/scan.yml
    with:
      fail-on: critical
      target-path: examples/benign-skill
      skill-pattern: SKILL.md
      report-output: ./.pruner-test
