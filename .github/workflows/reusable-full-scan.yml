# DEPRECATED. Use `.github/workflows/scan.yml` instead. Removed in 0.3.0.
#
# Consumers on 0.1.x referenced this workflow via
#   uses: ob-aion/pruner/.github/workflows/reusable-full-scan.yml@<version>
# 0.2.0 renamed the canonical entry-point to `scan.yml` to match the
# `pruner scan` CLI verb and the production-grade conventions used by
# Cisco's `scan-skills.yml` and Snyk's `agent-scan`. This file remains
# in place for one minor cycle as a thin alias that delegates to the
# new workflow with `secrets: inherit`. Migrate at your convenience:
#
#   uses: ob-aion/pruner/.github/workflows/scan.yml@<version>
name: reusable-full-scan (deprecated alias)
on:
  workflow_call:
    inputs:
      fail-on:
        required: false
        type: string
        default: 'critical'
      skill-pattern:
        required: false
        type: string
        default: 'skills/*/SKILL.md'
      report-output:
        required: false
        type: string
        default: './.pruner'
      scan-prompt-defense-posture:
        required: false
        type: string
        default: 'false'
      with-snyk:
        required: false
        type: string
        default: 'false'
      target-path:
        required: false
        type: string
        default: '.'
    secrets:
      SNYK_TOKEN:
        required: false

jobs:
  pruner:
    uses: ./.github/workflows/scan.yml
    with:
      fail-on: ${{ inputs.fail-on }}
      skill-pattern: ${{ inputs.skill-pattern }}
      report-output: ${{ inputs.report-output }}
      scan-prompt-defense-posture: ${{ inputs.scan-prompt-defense-posture }}
      with-snyk: ${{ inputs.with-snyk }}
      target-path: ${{ inputs.target-path }}
    secrets: inherit
