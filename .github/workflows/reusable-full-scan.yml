name: reusable-full-scan
on:
  workflow_call:
    inputs:
      fail-on:
        description: 'critical | high | medium | low | never'
        required: false
        type: string
        default: 'critical'
      skill-pattern:
        description: 'Glob for skill manifests'
        required: false
        type: string
        default: 'skills/*/SKILL.md'
      report-output:
        description: 'Where to write the report bundle'
        required: false
        type: string
        default: './.pruner'
      scan-prompt-defense-posture:
        description: 'Activate the PD pack (off by default)'
        required: false
        type: string
        default: 'false'
      with-snyk:
        description: 'Run snyk-agent-scan as opt-in second opinion'
        required: false
        type: string
        default: 'false'
      target-path:
        description: 'Path within the consumer repo to scan'
        required: false
        type: string
        default: '.'
    secrets:
      SNYK_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  pruner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - id: scan
        uses: ob-aion/pruner@0.1.3
        with:
          fail-on: ${{ inputs.fail-on }}
          skill-pattern: ${{ inputs.skill-pattern }}
          report-output: ${{ inputs.report-output }}
          scan-prompt-defense-posture: ${{ inputs.scan-prompt-defense-posture }}
          with-snyk: ${{ inputs.with-snyk }}
          target-path: ${{ inputs.target-path }}

      - if: ${{ always() }}
        name: Upload report bundle
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: pruner-report
          path: ${{ inputs.report-output }}/
          retention-days: 30
