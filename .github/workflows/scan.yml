name: scan
on:
  workflow_call:
    inputs:
      fail-on:
        description: 'critical | high | medium | low | never'
        required: false
        type: string
        default: 'critical'
      skill-pattern:
        description: 'Glob for skill manifests'
        required: false
        type: string
        default: 'skills/*/SKILL.md'
      report-output:
        description: 'Where to write the report bundle'
        required: false
        type: string
        default: './.pruner'
      scan-prompt-defense-posture:
        description: 'Activate the PD pack (off by default)'
        required: false
        type: string
        default: 'false'
      with-snyk:
        description: 'Run snyk-agent-scan as opt-in second opinion'
        required: false
        type: string
        default: 'false'
      target-path:
        description: 'Path within the consumer repo to scan'
        required: false
        type: string
        default: '.'
    secrets:
      SNYK_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write
  id-token: write
  attestations: write

jobs:
  pruner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Self-checkout the Pruner composite action at the same SHA this
      # reusable workflow file was loaded from. Eliminates the lockstep manual
      # bump that was the 0.2.7 bug class. GHA does not support expressions in
      # `uses:` action refs (actions/runner#1493, closed without
      # implementation); `uses: ./<path>` after a path-aware checkout is the
      # canonical workaround — same pattern actions/checkout uses to self-test.
      - id: self-ref
        shell: bash
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
          FALLBACK_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPO=""
          if [[ -n "${WORKFLOW_REF}" && "${WORKFLOW_REF}" == */.github/* ]]; then
            REPO="${WORKFLOW_REF%%/.github/*}"
          fi
          if [[ -z "${REPO}" ]]; then
            REPO="${FALLBACK_REPOSITORY}"
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ steps.self-ref.outputs.repo }}
          ref: ${{ github.workflow_sha }}
          path: .pruner-action
          persist-credentials: false

      - id: scan
        uses: ./.pruner-action
        with:
          fail-on: ${{ inputs.fail-on }}
          skill-pattern: ${{ inputs.skill-pattern }}
          report-output: ${{ inputs.report-output }}
          scan-prompt-defense-posture: ${{ inputs.scan-prompt-defense-posture }}
          with-snyk: ${{ inputs.with-snyk }}
          target-path: ${{ inputs.target-path }}

      - if: ${{ always() }}
        name: Upload report bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pruner-report
          path: ${{ inputs.report-output }}/
          retention-days: 30
