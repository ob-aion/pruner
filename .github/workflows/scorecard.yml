name: scorecard
on:
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # publish SARIF to Code Scanning
      id-token: write          # OIDC for OpenSSF results upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Optional fine-grained PAT with `Administration: read` scope on the
          # repo; lifts Branch-Protection from -1 (inconclusive) to a real score.
          # Falls back to GITHUB_TOKEN when the secret is unset, which keeps
          # every other check working at the cost of an inconclusive
          # Branch-Protection result.
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
        with:
          sarif_file: results.sarif
